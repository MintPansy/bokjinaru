server:
  port: ${PORT:8080}

spring:
  application:
    name: bokjinaru-api

welfare:
  cors:
    # 쉼표 구분. Vercel: https://your-app.vercel.app
    allowed-origins: "${WELFARE_CORS_ALLOWED_ORIGINS:http://localhost:3000}"
  odcloud:
    enabled: true
    base-url: https://api.odcloud.kr/api
    dataset-path: /15083323/v1/uddi:48d6c839-ce02-4546-901e-e9ad9bae8e0d
    service-key: "${ODCLOUD_SERVICE_KEY:}"
    per-page: 100
    max-pages: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
